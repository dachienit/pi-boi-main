<!DOCTYPE html>
<html lang='en'>
<head>
<meta name='viewport' content='width=device-width, initial-scale=1'>
<meta charset='utf-8'>
<title>HTML Sample - Enhanced</title>
<style>
:root {
  --bg-start: #eef2ff;
  --bg-end: #f8f7ff;
  --card: #ffffff;
  --text: #1f2937;
  --muted: #6b7280;
  --accent: #4f46e5;
}
* { box-sizing: border-box; }
html, body { height: 100%; }
body {
  margin: 0;
  font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, "Helvetica Neue", Arial;
  color: var(--text);
  background: linear-gradient(135deg, var(--bg-start) 0%, var(--bg-end) 100%);
  min-height: 100%;
}
.app {
  min-height: 100%;
  display: grid;
  place-items: center;
  padding: 40px 16px;
}
.card {
  width: min(720px, 90vw);
  background: rgba(255, 255, 255, 0.98);
  border-radius: 16px;
  padding: 28px 28px 26px;
  box-shadow: 0 20px 40px rgba(0,0,0,.08);
  border: 1px solid rgba(0,0,0,.05);
  backdrop-filter: saturate(1.2) blur(2px);
  transition: transform 0.25s ease, box-shadow 0.25s ease;
}
.card:hover {
  transform: translateY(-4px);
  box-shadow: 0 30px 60px rgba(0,0,0,.12);
}
.card h1 {
  margin: 0 0 8px;
  font-size: 28px;
  line-height: 1.25;
}
.card p {
  margin: 0;
  color: var(--muted);
}
.header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.badge {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 0 6px rgba(99, 102, 241, 0.15);
}
.title {
  font-weight: 700;
  font-size: 16px;
  color: #111827;
}
.actions {
  margin-top: 16px;
  display: flex;
  gap: 12px;
}
.btn {
  appearance: none;
  border: none;
  border-radius: 999px;
  padding: 10px 16px;
  font-size: 14px;
  cursor: pointer;
  background: #111827;
  color: #fff;
  transition: transform .2s ease;
}
.btn:hover { transform: translateY(-1px); }
.btn.secondary {
  background: #f3f4f6;
  color: #111827;
}
@media (max-width: 420px) {
  .card { padding: 20px; }
  .card h1 { font-size: 22px; }
}
</style>
</head>
<body>
  <div class='app'>
    <section class='card' aria-label='HTML sample card'>
      <div class='header'>
        <span class='badge' aria-hidden='true'></span>
        <div class='title'>HTML Sample – Enhanced</div>
      </div>
      <h1>Hello from Enhanced HTML</h1>
      <p>This version adds a smooth gradient background, a glassy card, subtle shadows, and responsive layout. No external dependencies.</p>
      <div class='actions'>
        <button class='btn' onclick='alert("Hello!")'>Say Hi</button>
        <button class='btn secondary' onclick='location.reload()'>Refresh</button>
      </div>
    </section>
  </div>
</body>
</html>
